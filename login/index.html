<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:#f5f5f5;
}

.box {
    width:350px;
    text-align:center;
}

button {
    width:100%;
    height:55px;
    margin:10px;
    border-radius:12px;
    border:1px solid #ccc;
    background:white;
    cursor:pointer;
    font-size:16px;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;

    transition:.2s;
}

button.loading {
    background:#999;
    color:white;
}

button img {
    width:25px;
}

#complete {
    display:none;
    font-size:30px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="box">

<div id="login">

<h1>Login</h1>

<button id="google" onclick="login('google')">
<img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg">
Login with Google
</button>


<button id="microsoft" onclick="login('microsoft')">
<img src="https://upload.wikimedia.org/wikipedia/commons/4/44/Microsoft_logo.svg">
Login with Microsoft
</button>

</div>


<div id="complete">
Complete!
</div>

</div>


<script>

let popup;


function login(provider){

    let button = document.getElementById(provider);

    button.classList.add("loading");

    button.innerHTML = "Loading...";


    popup = window.open(
        "https://example.com/auth/" + provider,
        "auth",
        "width=500,height=700"
    );

}



window.addEventListener("message", event=>{

    if(event.data === "authSuccess"){

        if(popup)
            popup.close();


        document.getElementById("login").style.display="none";
        document.getElementById("complete").style.display="block";

    }

});

</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</body>
</html>
