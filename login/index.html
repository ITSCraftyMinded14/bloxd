<!DOCTYPE html>
<html>
<head>
<title>BloxdTools - Login</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:#f5f5f5;
}

.box {
    width:350px;
    text-align:center;
}

button {
    width:100%;
    height:55px;
    margin:10px;
    border-radius:12px;
    border:1px solid #ccc;
    background:white;
    cursor:pointer;
    font-size:16px;

    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;

    transition:.2s;
}

button.loading {
    background:#999;
    color:white;
}

button img {
    width:25px;
}

#complete {
    display:none;
    font-size:30px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="box">

<div id="login">

<h1>Login</h1>

<button id="google" onclick="login('google')">
<img src="img/google-logo">
Login with Google
</button>


<button id="discord" onclick="login('discord')">
<img src="img/discord-logo">
Login with Discord
</button>

</div>


<div id="complete">
Complete!
</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseClient = supabase.createClient(
    "https://teqlwaiasfhlptolmyii.supabase.co",
    "YOUR_PUBLISHABLE_KEY"
);


async function login(provider){

    let button = document.getElementById(provider);

    button.classList.add("loading");
    button.innerHTML = "Loading...";


    await supabaseClient.auth.signInWithOAuth({

        provider: provider,

        options:{
            redirectTo:"http://localhost:3000"
        }

    });

}


// Check if already logged in

supabaseClient.auth.onAuthStateChange(
(event, session)=>{

    if(session){

        document.getElementById("login").style.display="none";

        document.getElementById("complete").style.display="block";

    }

});


</script>

</body>
</html>
